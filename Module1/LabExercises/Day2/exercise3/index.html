<html lang="en">
  <head>

    <title>Module 1 Exercise 3</title>
    <link href="styles.css" rel="stylesheet" />

        <div class="img-container">
          <img src="images/Cats/Fudge.jpg" alt="Fudge the Cat" />
        </div>
      </div>

      <div class="column" id="column2">
        <h1 id="heading2">World</h1>

        <label for="text2"></label>
        <input id="text2" type="text" value="Hi, I am Guss" />

        <button type="button" id="change-btn-2" class="btn change-btn">Change Me</button>
        <div class="img-container">
          <img src="images/Cats/Guss.jpg" alt="Guss the Cat" />
        </div>
      </div>
    </div>
  </body>
</html>
