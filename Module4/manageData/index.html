<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Data</title>

    <script src="script.js" defer></script>
  </head>

  <!-- B o d y -->
  <body>
    <h1>News</h1>

    <form id="newsForm">
