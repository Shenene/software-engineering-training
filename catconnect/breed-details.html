<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CatConnect | Breed Details</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet" />

    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Custom CSS -->
    <link href="css/styles.css" rel="stylesheet" />

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" defer></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

    <!-- JavaScript files -->
    <script src="js/settings.js" defer></script>
    <script src="js/breed-details.js" defer></script>
  </head>

  <!-- ----------------------------------------------------------------------------------------------------------------------- -->

  <body>
    <!-- вЃЎвЃЈвЃўвЃў--- M A I N   A P P   W R A P P E R ---вЃЎвЃЎ -->
    <div class="app-wrapper">
      <!-- вЃЎвЃЈвЃЈвЃў-- Header --вЃЎ -->
      <header class="details-header">
        <a href="discover.html" class="back-link" aria-label="Back to Discover Cats">
          <i class="bi bi-arrow-left"></i>
        </a>

        <h1>Breed Details</h1>

        <div aria-hidden="true"></div>
      </header>

      <!-- вЃЎвЃЈвЃЈвЃЎвЃўвЃЈвЃЎвЃЈвЃЈвЃў-- Main details area --вЃЎвЃЎвЃЎ -->
      <main id="breedDetailsContainer" class="breed-details-section">
        <p class="text-muted small">Loading breed details...</p>
      </main>

      <!-- вЃЎвЃЈвЃЈвЃЎвЃўвЃЈвЃЈ-- Breed Details Template --вЃЎвЃЎ -->
      <template id="breedDetailsTemplate">
        <article class="breed-details-card">
          <div class="breed-image-wrapper">
            <img class="breed-image" src="" alt="" />
          </div>

          <section class="breed-main-info">
            <h2 class="breed-title"></h2>
            <p class="breed-origin"></p>
            <p class="breed-description"></p>
          </section>

          <section class="breed-info-card">
            <h3>Breed Information</h3>

            <div class="info-grid">
              <div>
                <p class="info-label">Life Span</p>
                <p class="info-value breed-life-span"></p>
              </div>

              <div>
                <p class="info-label">Weight</p>
                <p class="info-value breed-weight"></p>
              </div>
            </div>
          </section>

          <section class="breed-info-card">
            <h3>Traits</h3>
            <div class="trait-list"></div>
          </section>

          <section class="breed-info-card">
            <h3>Statistics</h3>
            <div class="chart-wrapper">
              <canvas id="breedStatsChart"></canvas>
            </div>
          </section>

          <div class="breed-actions">
            <button id="saveBreedBtn" class="btn btn-outline-brand breed-action-btn" type="button">
              <i class="bi bi-heart"></i>
              <span>Save Breed</span>
            </button>

            <a id="wikipediaBtn" class="btn btn-outline-brand breed-action-btn" href="#" target="_blank" rel="noopener noreferrer">
              <i class="bi bi-book"></i>
              <span>Wikipedia</span>
            </a>
          </div>
        </article>
      </template>

      <!-- ----------------------------------------------------------------------------------------------------------------------- -->

      <!-- вЃЎвЃЈвЃЈвЃў-- Bottom Navigation --вЃЎ -->
      <nav class="bottom-nav" aria-label="Main navigation">
        <a href="index.html" class="nav-item">
          <i class="bi bi-house"></i>
          <span>Home</span>
        </a>

        <a href="discover.html" class="nav-item active" aria-current="page">
          <i class="bi bi-search"></i>
          <span>Discover</span>
        </a>

        <a href="create-post.html" class="nav-item">
          <i class="bi bi-plus-circle"></i>
          <span>Create</span>
        </a>

        <a href="#" class="nav-item">
          <i class="bi bi-bell"></i>
          <span>Activity</span>
        </a>

        <a href="profile.html" class="nav-item">
          <i class="bi bi-person"></i>
          <span>Profile</span>
        </a>
      </nav>
    </div>
  </body>
</html>
