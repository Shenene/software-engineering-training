<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CatConnect | Discover Cats</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet" />

    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Custom CSS -->
    <link href="css/styles.css" rel="stylesheet" />

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" defer></script>

    <!-- JavaScript files -->
    <script src="js/settings.js" defer></script>
    <script src="js/discover.js" defer></script>
  </head>

  <!-- ----------------------------------------------------------------------------------------------------------------------- -->

  <body>
    <!-- ⁡⁣⁢⁢--- M A I N   A P P   W R A P P E R ---⁡⁡ -->
    <div class="app-wrapper">
      <!-- ⁡⁣⁣⁢-- Header --⁡ -->
      <header class="app-header">
        <div class="brand">
          <img src="assets/icons/brand-logo.svg" alt="" aria-hidden="true" class="brand-logo" />

          <h1 class="visually-hidden">CatConnect</h1>
        </div>
      </header>

      <!-- Page Title -->
      <section class="page-title-section">
        <h2>Discover Cats</h2>
        <p>Search and explore cat breeds</p>
      </section>

      <!-- ⁡⁣⁣⁢-- Search breeds --⁡ -->
      <section class="search-section" aria-label="Search breeds">
        <div class="search-box">
          <i class="bi bi-search"></i>
          <input type="search" id="breedSearchInput" placeholder="Search breeds..." aria-label="Search breeds" />
        </div>
      </section>

      <!-- ⁡⁣⁣⁢-- Filter and Sort --⁡ -->
      <section class="discover-controls" aria-label="Filter and sort breeds">
        <div class="control-group">
          <label for="filterSelect" class="form-label">Filter</label>
          <select id="filterSelect" class="form-select">
            <option value="all">Select filter</option>
            <option value="origin">Origin</option>
            <option value="energy">Energy Level</option>
            <option value="affection">Affection Level</option>
            <option value="intelligence">Intelligence</option>
            <option value="childFriendly">Child Friendly</option>
          </select>
        </div>

        <div class="control-group">
          <label for="sortSelect" class="form-label">Sort</label>
          <select id="sortSelect" class="form-select">
            <option value="default">Sort</option>
            <option value="nameAZ">Name A-Z</option>
            <option value="nameZA">Name Z-A</option>
            <option value="highestEnergy">Highest Energy</option>
            <option value="highestIntelligence">Highest Intelligence</option>
            <option value="highestAffection">Highest Affection</option>
          </select>
        </div>
      </section>

      <!-- ----------------------------------------------------------------------------------------------------------------------- -->

      <!-- ⁡⁣⁣⁢-- Breed content --⁡ -->
      <main class="discover-section">
        <section class="breed-list-section">
          <h2>Recommended Breeds</h2>
          <div id="recommendedBreeds" class="breed-list">
            <p class="text-muted small">Loading breeds...</p>
          </div>
        </section>

        <section class="breed-list-section">
          <h2>Popular Breeds</h2>
          <div id="popularBreeds" class="breed-list"></div>
        </section>

        <section class="breed-list-section">
          <h2>All Breeds</h2>
          <div id="allBreeds" class="breed-list"></div>
        </section>
      </main>

      <!-- ⁡⁣⁣⁡⁢⁣⁣-- Breed Item Template --⁡⁡ -->
      <template id="breedItemTemplate">
        <a href="#" class="breed-item">
          <span class="breed-name"></span>
          <i class="bi bi-chevron-right" aria-hidden="true"></i>
        </a>
      </template>

      <!-- ----------------------------------------------------------------------------------------------------------------------- -->

      <!-- ⁡⁣⁣⁢-- Bottom Navigation --⁡ -->
      <nav class="bottom-nav" aria-label="Main navigation">
        <a href="index.html" class="nav-item">
          <i class="bi bi-house"></i>
          <span>Home</span>
        </a>

        <a href="discover.html" class="nav-item active" aria-current="page">
          <i class="bi bi-search"></i>
          <span>Discover</span>
        </a>

        <a href="create-post.html" class="nav-item">
          <i class="bi bi-plus-circle"></i>
          <span>Create</span>
        </a>

        <a href="#" class="nav-item">
          <i class="bi bi-bell"></i>
          <span>Activity</span>
        </a>

        <a href="profile.html" class="nav-item">
          <i class="bi bi-person"></i>
          <span>Profile</span>
        </a>
      </nav>
    </div>
  </body>
</html>
