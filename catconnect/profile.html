<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CatConnect | Profile</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet" />

    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Custom CSS -->
    <link href="css/styles.css" rel="stylesheet" />

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" defer></script>

    <!-- JavaScript -->
    <script src="js/settings.js" defer></script>
    <script src="js/profile.js" defer></script>
  </head>

  <!-- ----------------------------------------------------------------------------------------------------------------------- -->

  <body>
    <!-- 竅｡竅｣竅｢竅｡竅｣竅｢竅｡竅｣竅｢竅｢--- M A I N   A P P   W R A P P E R ---竅｡竅｡竅｡竅｡ -->
    <div class="app-wrapper">
      <!-- 竅｡竅｣竅｣竅｢-- Header --竅｡ -->
      <header class="details-header">
        <a href="index.html" class="back-link" aria-label="Back to Home Feed">
          <i class="bi bi-arrow-left"></i>
        </a>

        <h1>Cat Profile</h1>

        <div aria-hidden="true"></div>
      </header>

      <!-- 竅｡竅｣竅｣竅｢-- Profile content --竅｡ -->
      <main id="profileContainer">
        <p class="text-muted small">Loading profile...</p>
      </main>

      <!-- 竅｡竅｣竅｣竅｡竅｢竅｣竅｣-- Profile Template --竅｡竅｡ -->
      <template id="profileTemplate">
        <article class="profile-card">
          <div class="profile-avatar-wrapper">
            <img class="profile-avatar" src="" alt="" />
          </div>

          <section class="profile-main-info">
            <h2 class="profile-name"></h2>
            <p class="profile-meta"></p>
            <p class="profile-bio">Professional Napper</p>

            <button class="btn btn-brand follow-btn" type="button">Edit Profile</button>
          </section>

          <section class="profile-info-card">
            <h3>Breed Information</h3>

            <div class="profile-breed-grid">
              <div>
                <p class="info-label">Breed</p>
                <p class="info-value profile-breed"></p>
              </div>

              <div>
                <p class="info-label">Age</p>
                <p class="info-value profile-age"></p>
              </div>
            </div>
          </section>

          <section class="profile-stats">
            <div>
              <strong>2.4k</strong>
              <span>Followers</span>
            </div>

            <div>
              <strong>186</strong>
              <span>Following</span>
            </div>

            <div>
              <strong>42</strong>
              <span>Posts</span>
            </div>
          </section>

          <section class="recent-posts-section">
            <h3>Recent Posts</h3>
            <div id="profilePostsContainer" class="profile-posts-grid"></div>
          </section>
        </article>
      </template>

      <!----------------------------------------------- -->

      <!-- 竅｡竅｣竅｣竅｡竅｢竅｣竅｣-- Recent Post Template --竅｡竅｡ -->
      <template id="profilePostTemplate">
        <article class="profile-post-card">
          <img class="profile-post-image" src="" alt="" />
          <p class="profile-post-caption"></p>
        </article>
      </template>

      <!-- ----------------------------------------------------------------------------------------------------------------------- -->

      <!-- 竅｡竅｣竅｣竅｢-- Bottom Navigation --竅｡ -->
      <nav class="bottom-nav" aria-label="Main navigation">
        <a href="index.html" class="nav-item">
          <i class="bi bi-house"></i>
          <span>Home</span>
        </a>

        <a href="discover.html" class="nav-item">
          <i class="bi bi-search"></i>
          <span>Discover</span>
        </a>

        <a href="create-post.html" class="nav-item">
          <i class="bi bi-plus-circle"></i>
          <span>Create</span>
        </a>

        <a href="#" class="nav-item">
          <i class="bi bi-bell"></i>
          <span>Activity</span>
        </a>

        <a href="profile.html" class="nav-item active" aria-current="page">
          <i class="bi bi-person-fill"></i>
          <span>Profile</span>
        </a>
      </nav>
    </div>
  </body>
</html>
